services:
  # ── Backend: FastAPI + Uvicorn ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: bankscan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=BankScan
      - APP_VERSION=1.0.0
      - DEBUG=false
      - LOG_LEVEL=INFO
      - MAX_UPLOAD_SIZE_MB=50
      - MAX_PDF_PAGES=60
      - UPLOAD_DIR=uploads
      - OUTPUT_DIR=outputs
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    volumes:
      # Named volumes for persistent export files
      - bankscan_uploads:/app/uploads
      - bankscan_outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - bankscan-network

  # ── Frontend: Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bankscan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bankscan-network

  # ── Future: MongoDB ──────────────────────────────────────────────────────────
  # Uncomment when MongoDB persistence is enabled
  # mongo:
  #   image: mongo:7.0
  #   container_name: bankscan-mongo
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #   environment:
  #     - MONGO_INITDB_DATABASE=bankscan
  #   networks:
  #     - bankscan-network

volumes:
  bankscan_uploads:
    driver: local
  bankscan_outputs:
    driver: local
  # mongo_data:
  #   driver: local

networks:
  bankscan-network:
    driver: bridge
